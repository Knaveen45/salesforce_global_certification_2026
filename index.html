<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Travel Light System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Time Travel Light System</h1>
    <p>50-Year Calendar with 7-Light Holiday Algorithm</p>

    <div class="card">

        <label>Select Date</label>
        <input type="date" id="date">

        <button onclick="checkLights()">Check Lights</button>

    </div>

    <div class="status">

        <h2 id="holidayStatus">Holiday : --</h2>
        <h3 id="phase">Phase : Odd</h3>

    </div>

    <div class="lights">

        <div class="light" id="l1">1</div>
        <div class="light" id="l2">2</div>
        <div class="light" id="l3">3</div>
        <div class="light" id="l4">4</div>
        <div class="light" id="l5">5</div>
        <div class="light" id="l6">6</div>
        <div class="light" id="l7">7</div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
